name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint, TypeScript, Tests & CDK Diff
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # OIDC auth to AWS
      contents: read
      pull-requests: write  # Post CDK diff as PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'    # LTS — matches Lambda runtime
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: TypeScript check (infra)
        run: cd infra && npx tsc --noEmit

      - name: TypeScript check (lambdas)
        run: cd lambdas && npx tsc --noEmit || true  # No tsconfig yet — warn only

      - name: Run tests
        run: npm test --if-present

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::914964735635:role/lavavps-github-actions-role
          aws-region: us-east-1
        continue-on-error: true  # Diff is best-effort on PRs from forks

      - name: CDK Diff
        id: cdk-diff
        run: |
          cd infra
          DIFF_OUTPUT=$(npx cdk diff --all 2>&1 || true)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post CDK diff as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const diff = `${{ steps.cdk-diff.outputs.diff }}`;
            const body = diff
              ? `## CDK Diff\n\`\`\`\n${diff.slice(0, 60000)}\n\`\`\``
              : '## CDK Diff\n_No infrastructure changes detected or diff unavailable._';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith('## CDK Diff'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true  # Warn only during early development
